<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>XAUUSD · Gold Trader</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#060b14;--card:#0d1420;--bdr:#15202e;--dim:#4a5a72;--txt:#cbd5e1;--br:#f1f5f9;--g:#10b981;--r:#ef4444;--y:#f59e0b;--b:#3b82f6;--p:#8b5cf6}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:12px;max-width:460px;margin:0 auto;min-height:100vh}
.cfg-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;max-width:460px;margin:0 auto}
.cfg-overlay h2{color:var(--br);font-size:16px;margin-bottom:16px}
.cfg-overlay input{width:100%;padding:10px;margin-bottom:10px;background:#111827;border:1px solid var(--bdr);border-radius:6px;color:var(--txt);font-family:inherit;font-size:11px}
.cfg-overlay button{width:100%;padding:12px;background:#1d4ed8;color:#fff;border:none;border-radius:6px;font-weight:700;font-family:inherit;cursor:pointer;font-size:13px}
.cfg-overlay .note{font-size:9px;color:var(--dim);margin-top:12px;text-align:center;line-height:1.5}
.hdr{padding:12px 12px 8px;background:linear-gradient(180deg,#0a1020,var(--bg));border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:50}
.hdr-r{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.hdr-l{display:flex;align-items:center;gap:5px}
.sym{font-size:10px;color:var(--dim);letter-spacing:2px}
.bd{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid var(--bdr);background:#111827;color:#94a3b8}
.bd-g{background:#052e16;color:#4ade80;border-color:#14532d}.bd-r{background:#350a0a;color:#f87171;border-color:#7f1d1d}.bd-y{background:#422006;color:#fbbf24;border-color:#78350f}
.pr{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.pm{font-size:24px;font-weight:800;color:var(--br);letter-spacing:-1px}
.pc{font-size:12px;font-weight:600}
.ind{display:flex;gap:7px;font-size:8px;color:var(--dim);flex-wrap:wrap}
.tfb{display:flex;gap:3px}
.tf{padding:2px 8px;border-radius:3px;border:none;cursor:pointer;font-size:9px;font-weight:700;font-family:inherit;background:#111827;color:var(--dim)}.tf.a{background:#1d4ed8;color:#fff}
.cnt{padding:6px 10px 68px}
.cd{background:var(--card);border-radius:10px;border:1px solid var(--bdr);padding:12px;margin-bottom:8px}
.lb{font-size:9px;color:var(--dim);letter-spacing:1.5px;font-weight:600}
.tb{display:flex;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;background:#080e19;border-top:1px solid var(--bdr);z-index:100}
.tbn{flex:1;padding:5px 0 9px;border:none;background:none;cursor:pointer;font-size:9px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:1px;font-family:inherit;color:#2a3a52}.tbn.a{color:var(--b)}
.tbn .ic{font-size:15px}
.pb{background:#111827;border-radius:4px;height:5px;overflow:hidden}.pf{height:100%;border-radius:4px;transition:width 0.5s}
.rbtn{padding:3px 8px;border-radius:3px;border:none;cursor:pointer;background:#1d4ed8;color:#fff;font-size:9px;font-weight:700;font-family:inherit}.rbtn:disabled{opacity:0.5}
.sr{display:flex;justify-content:space-between;padding:1px 0;font-size:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:6px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px}
.sig{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #0f1a28;font-size:10px}
.tr{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid #0f1a28;font-size:9px}
.cb{background:#0a1020;border-radius:6px;padding:8px;text-align:center}
</style>
</head>
<body>
<!-- CONFIG SCREEN -->
<div class="cfg-overlay" id="cfgScreen">
  <h2>🏆 Gold Trader XM</h2>
  <input id="cfgTD" placeholder="Twelve Data API Key" value="">
  <input id="cfgBrave" placeholder="Brave Search API Key" value="">
  <input id="cfgAnth" placeholder="Anthropic API Key (opcional)" value="">
  <button onclick="saveConfig()">Iniciar Dashboard</button>
  <div class="note">Las keys se guardan localmente en tu navegador.<br>Nunca se envían a terceros.</div>
</div>

<!-- APP -->
<div id="app" style="display:none">
<div class="hdr">
  <div class="hdr-r">
    <div class="hdr-l"><span class="sym">XAUUSD</span><span class="bd">XM 500:1</span><span id="sDot" style="width:5px;height:5px;border-radius:50%;display:inline-block;background:var(--y)"></span><span id="sTxt" style="font-size:7px;color:var(--y)">...</span></div>
    <div class="tfb"><button class="tf" onclick="setTF('15min')">15m</button><button class="tf a" onclick="setTF('1h')">1H</button><button class="tf" onclick="setTF('4h')">4H</button></div>
  </div>
  <div class="pr"><span class="pm" id="pM">Cargando...</span><span class="pc" id="pC"></span></div>
  <div class="ind" id="ind"></div>
</div>
<div class="cnt" id="cnt"></div>
<div class="tb">
  <button class="tbn a" onclick="setTab('chart')"><span class="ic">📈</span>Gráfica</button>
  <button class="tbn" onclick="setTab('plan')"><span class="ic">🎯</span>Plan</button>
  <button class="tbn" onclick="setTab('bot')"><span class="ic">🤖</span>Bot</button>
  <button class="tbn" onclick="setTab('news')"><span class="ic">📰</span>Noticias</button>
</div>
</div>

<script>
// Keys from localStorage
let TK='',BK='',AK_KEY='';
function saveConfig(){
  TK=document.getElementById('cfgTD').value.trim();
  BK=document.getElementById('cfgBrave').value.trim();
  AK_KEY=document.getElementById('cfgAnth').value.trim();
  if(!TK){alert('Twelve Data key es requerida');return;}
  localStorage.setItem('gt_td',TK);localStorage.setItem('gt_bv',BK);localStorage.setItem('gt_ak',AK_KEY);
  document.getElementById('cfgScreen').style.display='none';
  document.getElementById('app').style.display='block';
  init();
}
function loadConfig(){
  TK=localStorage.getItem('gt_td')||'';BK=localStorage.getItem('gt_bv')||'';AK_KEY=localStorage.getItem('gt_ak')||'';
  if(TK){document.getElementById('cfgTD').value=TK;document.getElementById('cfgBrave').value=BK;document.getElementById('cfgAnth').value=AK_KEY;
    document.getElementById('cfgScreen').style.display='none';document.getElementById('app').style.display='block';init();}
}

const TD=e=>`https://api.twelvedata.com/${e}&apikey=${TK}`;
const XM={bal:100,lev:500,so:20,cs:100};
const fmt=n=>`$${Math.abs(n).toFixed(2)}`;const fS=n=>n>=0?`+$${n.toFixed(2)}`:`-$${Math.abs(n).toFixed(2)}`;const fP=n=>n?`$${n.toFixed(2)}`:'—';
const cPnL=(t,e,c,l)=>(t==='BUY'?c-e:e-c)*l*XM.cs;const cMg=(p,l)=>(p*l*XM.cs)/XM.lev;const bd=(c,t)=>`<span class="bd bd-${c}">${t}</span>`;

let S={tab:'chart',tf:'1h',gold:null,q:null,candles:[],corr:{btc:null,eur:null,eth:null},status:'connecting',
bot:{bal:100,eq:100,pos:null,trades:[],tT:0,w:0,l:0,resets:0,plan:{action:'ESPERAR',conf:0,signals:{},score:0},ml:0},
news:[],nI:0,nL:false,fear:42,aiPlan:null,aiL:false};

function sma(d,p){if(d.length<p)return null;return d.slice(-p).reduce((a,b)=>a+b.c,0)/p;}
function calcRSI(d,p=14){if(d.length<p+1)return 50;const ch=[];for(let i=d.length-p;i<d.length;i++)ch.push(d[i].c-d[i-1].c);const g=ch.filter(c=>c>0).reduce((a,b)=>a+b,0)/p;const l=Math.abs(ch.filter(c=>c<0).reduce((a,b)=>a+b,0))/p;return l===0?100:100-100/(1+g/l);}
function calcMACD(d){const e=(dt,p)=>{if(dt.length<p)return null;const k=2/(p+1);let v=dt.slice(0,p).reduce((a,b)=>a+b.c,0)/p;for(let i=p;i<dt.length;i++)v=dt[i].c*k+v*(1-k);return v;};const e12=e(d,12),e26=e(d,26);if(!e12||!e26)return{hist:0};return{hist:(e12-e26)*0.2};}
function calcSR(d){if(d.length<5)return{S:[],R:[]};const c=d.map(x=>x.c),mn=Math.min(...c),mx=Math.max(...c),rn=mx-mn||1;return{S:[mn+rn*0.05,mn+rn*0.236,mn+rn*0.382],R:[mn+rn*0.618,mn+rn*0.786,mn+rn*0.95]};}

let Q=[],busy=false;
function enq(u,cb){Q.push({u,cb});}
function proc(){if(busy||Q.length===0)return;busy=true;const{u,cb}=Q.shift();fetch(u).then(r=>r.json()).then(d=>cb(d)).catch(()=>cb(null)).finally(()=>{setTimeout(()=>{busy=false},8500);});}
setInterval(proc,1000);

async function loadCandles(){try{const r=await fetch(TD(`time_series?symbol=XAU/USD&interval=${S.tf}&outputsize=50`));const d=await r.json();if(d.values){S.candles=d.values.reverse().map(v=>({t:new Date(v.datetime).getTime(),o:+v.open,h:+v.high,l:+v.low,c:+v.close}));S.status='live';}}catch{S.status='error';}render();}
async function loadQuote(){try{const r=await fetch(TD(`quote?symbol=XAU/USD`));const d=await r.json();if(d.close){S.gold=+d.close;S.q={open:+d.open,high:+d.high,low:+d.low,close:+d.close,prev:+d.previous_close,ch:+d.change,chp:+d.percent_change,w52l:+d.fifty_two_week?.low,w52h:+d.fifty_two_week?.high};S.status='live';}}catch{}render();}
function refreshPrice(){enq(TD(`price?symbol=XAU/USD`),d=>{if(d?.price){S.gold=+d.price;S.status='live';if(S.candles.length){const l=S.candles[S.candles.length-1];l.c=S.gold;l.h=Math.max(l.h,S.gold);l.l=Math.min(l.l,S.gold);}runBot();render();}});
setTimeout(()=>{enq(TD(`price?symbol=BTC/USD,EUR/USD,ETH/USD`),d=>{if(d){S.corr={btc:d['BTC/USD']?.price?+d['BTC/USD'].price:null,eur:d['EUR/USD']?.price?+d['EUR/USD'].price:null,eth:d['ETH/USD']?.price?+d['ETH/USD'].price:null};render();}});},10000);}

async function fetchNews(){
  if(!BK){S.news=[{title:'Configura Brave Search API para noticias',summary:'',source:'',age:'',impact:'neutral'}];render();return;}
  S.nL=true;render();
  try{const r=await fetch('https://api.search.brave.com/res/v1/news/search?q=gold+XAUUSD+price+USD+oil+war+fed+tariffs&count=8',{headers:{'X-Subscription-Token':BK,'Accept':'application/json'}});
  const d=await r.json();
  if(d.results){S.news=d.results.map(n=>{const txt=(n.title+' '+(n.description||'')).toLowerCase();let impact='neutral';if(txt.match(/surge|rally|rise|bullish|safe.?haven|buy|support|higher|gains|upside|record/))impact='positive';if(txt.match(/drop|fall|bearish|sell|decline|lower|down|crash|correction|losses|slump/))impact='negative';return{title:n.title,summary:(n.description||'').slice(0,150),source:n.profile?.name||'',age:n.age||'',impact};});
  S.nI=S.news.reduce((a,n)=>a+(n.impact==='positive'?1:n.impact==='negative'?-1:0),0);}}catch(e){console.error('News error:',e);}
  S.nL=false;render();
}

async function genAIPlan(){
  if(!AK_KEY||!S.gold)return;S.aiL=true;render();
  const _rsi=calcRSI(S.candles),_macd=calcMACD(S.candles),sr=calcSR(S.candles);
  const newsSum=S.news.slice(0,4).map(n=>`${n.title} (${n.impact})`).join('; ');
  const prompt=`Eres analista XAUUSD. Datos: Precio:$${S.gold.toFixed(2)}, RSI:${_rsi.toFixed(1)}, MACD:${_macd.hist.toFixed(3)}, SMA20:${sma(S.candles,20)?.toFixed(2)||'N/A'}, S:${sr.S.map(s=>s.toFixed(2))}, R:${sr.R.map(r=>r.toFixed(2))}, BTC:$${S.corr.btc||'N/A'}, EUR:${S.corr.eur||'N/A'}, Noticias:${newsSum||'N/A'}, Cuenta:$100 500:1. Responde SOLO JSON: {"action":"COMPRA"|"VENTA"|"ESPERAR","confidence":0-100,"reasoning":"español corto","entry":"precio","sl":"precio","tp":"precio","risk":"texto"}`;
  try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':AK_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:prompt}]})});
  const d=await r.json();const txt=d.content?.find(b=>b.type==='text')?.text||'';try{S.aiPlan=JSON.parse(txt.replace(/```json|```/g,'').trim());}catch{S.aiPlan={action:'ERROR',reasoning:txt.slice(0,200)};}}catch(e){S.aiPlan={action:'ERROR',reasoning:e.message};}
  S.aiL=false;render();
}

let lastBot=0;
function runBot(){
  if(!S.gold||S.candles.length<15||Date.now()-lastBot<15000)return;lastBot=Date.now();
  const p=S.gold,d=S.candles,sr=calcSR(d),b=S.bot;
  const _rsi=calcRSI(d),_macd=calcMACD(d),_s20=sma(d,20),_s50=sma(d,Math.min(50,d.length));
  const dxy=S.corr.eur?(1/S.corr.eur-0.868)*100:0;
  let sc=0;const sig={};
  if(_rsi<30){sc+=25;sig.rsi=`Oversold (${_rsi.toFixed(0)})`;}else if(_rsi>70){sc-=25;sig.rsi=`Overbought (${_rsi.toFixed(0)})`;}else if(_rsi<40){sc+=10;sig.rsi=`Bajo (${_rsi.toFixed(0)})`;}else if(_rsi>60){sc-=10;sig.rsi=`Alto (${_rsi.toFixed(0)})`;}else sig.rsi=`Neutral (${_rsi.toFixed(0)})`;
  if(_macd.hist>0.3){sc+=15;sig.macd='+ Compra';}else if(_macd.hist<-0.3){sc-=15;sig.macd='− Venta';}else sig.macd='Neutral';
  if(_s20&&_s50){if(_s20>_s50){sc+=12;sig.trend='Alcista';}else{sc-=12;sig.trend='Bajista';}}
  if(sr.S.some(s=>Math.abs(p-s)<5)){sc+=15;sig.sr='Soporte';}else if(sr.R.some(r=>Math.abs(p-r)<5)){sc-=15;sig.sr='Resistencia';}else sig.sr='Media';
  if(dxy>1){sc-=10;sig.dxy='USD↑';}else if(dxy<-1){sc+=10;sig.dxy='USD↓';}else sig.dxy='Estable';
  if(S.corr.btc){sig.btc=`$${(S.corr.btc/1000).toFixed(0)}K`;}
  if(S.nI){sc+=S.nI*8;sig.news=S.nI>0?'Alcista':'Bajista';}
  const conf=Math.min(100,Math.abs(sc));let act='ESPERAR';if(sc>=25)act='COMPRA';else if(sc<=-25)act='VENTA';
  b.plan={action:act,conf,signals:sig,score:sc};
  if(b.pos&&conf>=40&&((b.pos.type==='BUY'&&act==='VENTA')||(b.pos.type==='SELL'&&act==='COMPRA'))){const pv=cPnL(b.pos.type,b.pos.entry,p,b.pos.lots);b.bal+=pv;b.trades.unshift({...b.pos,exit:p,pnl:pv,at:Date.now()});b.trades=b.trades.slice(0,30);b.tT++;pv>0?b.w++:b.l++;b.pos=null;}
  if(b.pos){const pp=b.pos;if((pp.type==='BUY'?p<=pp.sl:p>=pp.sl)||(pp.type==='BUY'?p>=pp.tp:p<=pp.tp)){const pv=cPnL(pp.type,pp.entry,p,pp.lots);const tg=(pp.type==='BUY'?p>=pp.tp:p<=pp.tp)?'TP':'SL';b.bal+=pv;b.trades.unshift({...pp,exit:p,pnl:pv,at:Date.now(),tag:tg});b.trades=b.trades.slice(0,30);b.tT++;pv>0?b.w++:b.l++;b.pos=null;}}
  if(!b.pos&&conf>=40&&act!=='ESPERAR'&&b.bal>10){const lots=b.bal>60?0.02:0.01,m=cMg(p,lots);if(m<b.bal*0.8){const type=act==='COMPRA'?'BUY':'SELL',slD=5+(100-conf)*0.04;b.pos={type,entry:p,lots,margin:m,sl:type==='BUY'?p-slD:p+slD,tp:type==='BUY'?p+slD*2:p-slD*2,at:Date.now()};}}
  if(b.pos){const ur=cPnL(b.pos.type,b.pos.entry,p,b.pos.lots);b.eq=b.bal+ur;b.ml=b.pos.margin>0?(b.eq/b.pos.margin)*100:0;if(b.ml<=XM.so){b.bal=Math.max(0,b.bal+ur);b.trades.unshift({...b.pos,exit:p,pnl:ur,at:Date.now(),tag:'STOP OUT'});b.trades=b.trades.slice(0,30);b.tT++;b.l++;b.pos=null;b.ml=0;}}else{b.eq=b.bal;b.ml=0;}
  if(b.bal<=1||b.eq<=0){b.bal=100;b.eq=100;b.pos=null;b.resets++;b.ml=0;}
}

function rChart(d,sr,w,h){if(d.length<3)return'<div style="text-align:center;padding:40px;color:#2a3a52;font-size:11px">Cargando velas...</div>';const c=d.map(x=>x.c),all=[...c,...(sr?.S||[]),...(sr?.R||[])],mn=Math.min(...all)-1,mx=Math.max(...all)+1,rn=mx-mn||1;const y=v=>14+((mx-v)/rn)*(h-28),x=i=>8+(i/(c.length-1))*(w-16);const line=c.map((v,i)=>`${i===0?'M':'L'}${x(i)},${y(v)}`).join(' ');const area=`${line} L${x(c.length-1)},${h-14} L${x(0)},${h-14} Z`;const up=c[c.length-1]>=c[0],col=up?'var(--g)':'var(--r)';let s=`<svg width="${w}" height="${h}" style="display:block"><defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity="0.18"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs><path d="${area}" fill="url(#cg)"/><path d="${line}" fill="none" stroke="${col}" stroke-width="1.5"/>`;(sr?.S||[]).forEach((v,i)=>{s+=`<line x1="8" y1="${y(v)}" x2="${w-8}" y2="${y(v)}" stroke="var(--g)" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.5"/><text x="${w-6}" y="${y(v)-2}" fill="var(--g)" font-size="6.5" text-anchor="end">S${i+1}</text>`;});(sr?.R||[]).forEach((v,i)=>{s+=`<line x1="8" y1="${y(v)}" x2="${w-8}" y2="${y(v)}" stroke="var(--r)" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.5"/><text x="${w-6}" y="${y(v)-2}" fill="var(--r)" font-size="6.5" text-anchor="end">R${i+1}</text>`;});s+=`<circle cx="${x(c.length-1)}" cy="${y(c[c.length-1])}" r="3" fill="${col}"><animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/></circle><text x="${x(c.length-1)-4}" y="${y(c[c.length-1])-6}" fill="${col}" font-size="8" font-weight="700" text-anchor="end">${fP(c[c.length-1])}</text></svg>`;return s;}
function gauge(v,lb,mn=0,mx=100){const p=Math.max(0,Math.min(1,(v-mn)/(mx-mn)));const c=p<0.3?'var(--r)':p<0.6?'var(--y)':'var(--g)';return`<div style="text-align:center"><svg width="64" height="38" viewBox="0 0 64 38"><path d="M 6 34 A 24 24 0 0 1 58 34" fill="none" stroke="#1a2332" stroke-width="4.5" stroke-linecap="round"/><path d="M 6 34 A 24 24 0 0 1 58 34" fill="none" stroke="${c}" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="${p*76} 76"/></svg><div style="font-size:7.5px;color:var(--dim);margin-top:-3px">${lb}</div><div style="font-size:12px;font-weight:700;color:${c}">${v?.toFixed(0)}</div></div>`;}

function render(){
  const g=S.gold,q=S.q,b=S.bot,d=S.candles,sr=calcSR(d),_rsi=calcRSI(d),_macd=calcMACD(d),_s20=sma(d,20);
  const sc=S.status==='live'?'var(--g)':'var(--y)';
  document.getElementById('sDot').style.background=sc;document.getElementById('sTxt').style.color=sc;document.getElementById('sTxt').textContent=S.status==='live'?'LIVE':'...';
  document.getElementById('pM').textContent=g?fP(g):'Cargando...';
  document.getElementById('pC').innerHTML=q?`<span style="color:${q.ch>=0?'var(--g)':'var(--r)'}">${q.ch>=0?'+':''}${q.ch?.toFixed(2)} (${q.chp?.toFixed(2)}%)</span>`:'';
  let ind=`<span>RSI <b style="color:${_rsi>70?'var(--r)':_rsi<30?'var(--g)':'var(--y)'}">${_rsi.toFixed(0)}</b></span><span>SMA20 <b style="color:var(--b)">${_s20?.toFixed(0)||'—'}</b></span><span>MACD <b style="color:${_macd.hist>0?'var(--g)':'var(--r)'}">${_macd.hist.toFixed(2)}</b></span>`;
  if(S.corr.btc)ind+=`<span>BTC <b style="color:var(--y)">$${(S.corr.btc/1000).toFixed(1)}K</b></span>`;
  if(S.corr.eur)ind+=`<span>EUR <b style="color:var(--p)">${S.corr.eur.toFixed(4)}</b></span>`;
  ind+=`<span>Eq <b style="color:${b.eq>=b.bal?'var(--g)':'var(--r)'}">${fmt(b.eq)}</b></span>`;
  document.getElementById('ind').innerHTML=ind;
  document.querySelectorAll('.tbn').forEach((btn,i)=>btn.classList.toggle('a',['chart','plan','bot','news'][i]===S.tab));
  const cw=Math.min(window.innerWidth-16,430);let h='';

  if(S.tab==='chart'){
    h+=`<div class="cd">${rChart(d,sr,cw-44,175)}</div>`;
    h+=`<div class="cd"><div class="lb" style="margin-bottom:6px">SOPORTES & RESISTENCIAS</div><div style="display:flex;gap:8px"><div style="flex:1">`;sr.S.forEach((s,i)=>{h+=`<div class="sr"><span style="color:var(--g)">S${i+1}</span><b style="color:var(--g)">${fP(s)}</b></div>`;});h+=`</div><div style="width:1px;background:var(--bdr)"></div><div style="flex:1">`;sr.R.forEach((r,i)=>{h+=`<div class="sr"><span style="color:var(--r)">R${i+1}</span><b style="color:var(--r)">${fP(r)}</b></div>`;});h+=`</div></div></div>`;
    if(q){h+=`<div class="cd"><div class="lb" style="margin-bottom:6px">DATOS DE SESIÓN</div><div class="g4" style="font-size:9px;text-align:center"><div><span style="color:var(--dim)">Open</span><br><b>${fP(q.open)}</b></div><div><span style="color:var(--dim)">High</span><br><b style="color:var(--g)">${fP(q.high)}</b></div><div><span style="color:var(--dim)">Low</span><br><b style="color:var(--r)">${fP(q.low)}</b></div><div><span style="color:var(--dim)">Prev</span><br><b>${fP(q.prev)}</b></div></div>`;if(q.w52l)h+=`<div style="margin-top:6px;font-size:8px;color:var(--dim);text-align:center">52w: ${fP(q.w52l)} — ${fP(q.w52h)}</div>`;h+=`</div>`;}
    h+=`<div class="cd"><div style="display:flex;justify-content:space-around">${gauge(_rsi,'RSI')}${gauge(S.fear,'Fear/Greed')}${gauge(b.ml||100,'Margin %',0,500)}</div></div>`;
  }
  if(S.tab==='plan'){
    const bc=b.plan.action==='COMPRA'?'#14532d':b.plan.action==='VENTA'?'#7f1d1d':'var(--bdr)';
    h+=`<div class="cd" style="border-color:${bc}"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span class="lb">ANÁLISIS TÉCNICO</span>${bd(b.plan.action==='COMPRA'?'g':b.plan.action==='VENTA'?'r':'y',(b.plan.action==='COMPRA'?'🟢':b.plan.action==='VENTA'?'🔴':'🟡')+' '+b.plan.action)}</div><div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:10px;color:var(--dim)">Confianza</span><span style="font-size:11px;font-weight:700;color:${b.plan.conf>60?'var(--g)':'var(--y)'}">${b.plan.conf}%</span></div><div class="pb"><div class="pf" style="width:${b.plan.conf}%;background:${b.plan.conf>60?'var(--g)':'var(--y)'}"></div></div></div><div style="font-size:10px;color:#64748b">Score: <b style="color:${b.plan.score>0?'var(--g)':b.plan.score<0?'var(--r)':'var(--y)'}">${b.plan.score}</b></div></div>`;
    h+=`<div class="cd"><div class="lb" style="margin-bottom:6px">SEÑALES</div>`;Object.entries(b.plan.signals).forEach(([k,v])=>{const c=v?.match(/Compra|Alcista|Oversold|Soporte|↓/)?'var(--g)':v?.match(/Venta|Bajista|Overbought|Resistencia|↑/)?'var(--r)':'#94a3b8';h+=`<div class="sig"><span style="color:var(--dim);text-transform:uppercase;font-size:8px;font-weight:600">${k}</span><span style="color:${c};max-width:68%;text-align:right;font-size:9px">${v}</span></div>`;});h+=`</div>`;
    h+=`<div class="cd"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span class="lb">🧠 PLAN IA</span><button class="rbtn" onclick="genAIPlan()" ${S.aiL||!AK_KEY?'disabled':''}>${S.aiL?'Analizando...':!AK_KEY?'Sin API Key':'Generar Plan'}</button></div>`;
    if(S.aiPlan){const ap=S.aiPlan;h+=`<div style="margin-bottom:6px">${bd(ap.action==='COMPRA'?'g':ap.action==='VENTA'?'r':'y',ap.action)} <span style="font-size:10px;color:var(--dim)">Conf: ${ap.confidence||'?'}%</span></div><div style="font-size:10px;color:var(--txt);line-height:1.4;margin-bottom:6px">${ap.reasoning||''}</div>`;if(ap.entry&&ap.entry!=='null')h+=`<div style="font-size:9px;color:var(--dim)">Entry: <b>${ap.entry}</b> · SL: <b style="color:var(--r)">${ap.sl}</b> · TP: <b style="color:var(--g)">${ap.tp}</b></div>`;if(ap.risk)h+=`<div style="font-size:9px;color:var(--y);margin-top:4px">⚠️ ${ap.risk}</div>`;}else{h+=`<div style="font-size:10px;color:#2a3a52;text-align:center;padding:8px">Presiona "Generar Plan"</div>`;}h+=`</div>`;
    h+=`<div class="cd"><div class="lb" style="margin-bottom:6px">MERCADOS</div><div class="g3">`;[{l:'BTC/USD',v:S.corr.btc?`$${(S.corr.btc/1000).toFixed(1)}K`:'—',c:'var(--y)'},{l:'EUR/USD',v:S.corr.eur?.toFixed(4)||'—',c:'var(--p)'},{l:'ETH/USD',v:S.corr.eth?`$${S.corr.eth.toFixed(0)}`:'—',c:'var(--b)'}].forEach(m=>{h+=`<div class="cb"><div style="font-size:7px;color:var(--dim);margin-bottom:2px">${m.l}</div><div style="font-size:12px;font-weight:700;color:${m.c}">${m.v}</div></div>`;});h+=`</div></div>`;
  }
  if(S.tab==='bot'){
    h+=`<div class="cd" style="background:linear-gradient(135deg,#0a1020,#0d1420)"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span class="lb">PAPER TRADING · XM</span>${bd('g','AUTO')}</div><div class="g2" style="margin-bottom:6px"><div><div style="font-size:8px;color:var(--dim)">Balance</div><div style="font-size:18px;font-weight:800;color:var(--br)">${fmt(b.bal)}</div></div><div><div style="font-size:8px;color:var(--dim)">Equity</div><div style="font-size:18px;font-weight:800;color:${b.eq>=b.bal?'var(--g)':'var(--r)'}">${fmt(b.eq)}</div></div></div><div style="display:flex;gap:6px;font-size:9px;flex-wrap:wrap"><span>Trades: <b>${b.tT}</b></span><span style="color:var(--g)">W: <b>${b.w}</b></span><span style="color:var(--r)">L: <b>${b.l}</b></span><span style="color:var(--y)">Reset: <b>${b.resets}</b></span>${b.tT>0?`<span>WR: <b style="color:var(--b)">${((b.w/b.tT)*100).toFixed(0)}%</b></span>`:''}</div>${b.ml>0?`<div style="margin-top:3px;font-size:9px">Margin: <b style="color:${b.ml<100?'var(--r)':b.ml<200?'var(--y)':'var(--g)'}">${b.ml.toFixed(0)}%</b></div>`:''}</div>`;
    if(b.pos){h+=`<div class="cd" style="border-color:${b.pos.type==='BUY'?'#14532d':'#7f1d1d'}"><div style="display:flex;justify-content:space-between;margin-bottom:4px">${bd(b.pos.type==='BUY'?'g':'r',(b.pos.type==='BUY'?'🟢 LONG':'🔴 SHORT')+' '+b.pos.lots+'L')}<span style="font-size:9px;color:var(--dim)">Mg: ${fmt(b.pos.margin)}</span></div><div class="g3" style="font-size:9px"><div><span style="color:var(--dim)">Entry</span><br><b>${fP(b.pos.entry)}</b></div><div><span style="color:var(--g)">TP</span><br><b style="color:var(--g)">${fP(b.pos.tp)}</b></div><div><span style="color:var(--r)">SL</span><br><b style="color:var(--r)">${fP(b.pos.sl)}</b></div></div>${g?`<div style="margin-top:4px;font-size:11px">P&L: <b style="color:${cPnL(b.pos.type,b.pos.entry,g,b.pos.lots)>=0?'var(--g)':'var(--r)'}">${fS(cPnL(b.pos.type,b.pos.entry,g,b.pos.lots))}</b></div>`:''}</div>`;}
    h+=`<div class="cd"><div class="lb" style="margin-bottom:4px">HISTORIAL</div>`;if(b.trades.length===0)h+=`<div style="text-align:center;color:#2a3a52;padding:10px;font-size:10px">Esperando trade...</div>`;b.trades.forEach(t=>{h+=`<div class="tr"><div style="display:flex;gap:3px">${bd(t.type==='BUY'?'g':'r',t.type)}${t.tag?bd(t.tag==='TP'?'g':'r',t.tag):''}</div><span style="color:var(--dim)">${fP(t.entry)}→${fP(t.exit)}</span><span style="font-weight:700;color:${t.pnl>=0?'var(--g)':'var(--r)'}">${fS(t.pnl)}</span></div>`;});h+=`</div>`;
  }
  if(S.tab==='news'){
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span class="lb">NOTICIAS · BRAVE SEARCH</span><button class="rbtn" onclick="fetchNews()" ${S.nL?'disabled':''}>${S.nL?'Buscando...':'🔄 Actualizar'}</button></div>`;
    h+=`<div class="cd" style="background:#0a1020"><div style="display:flex;justify-content:space-between"><span style="font-size:9px;color:var(--dim)">Impacto neto</span>${bd(S.nI>0?'g':S.nI<0?'r':'y',(S.nI>0?'↑ ALCISTA':S.nI<0?'↓ BAJISTA':'→ NEUTRO')+` (${S.nI})`)}</div></div>`;
    if(S.news.length===0&&!S.nL)h+=`<div class="cd" style="text-align:center;color:#2a3a52;font-size:10px">Presiona 🔄</div>`;
    S.news.forEach(n=>{h+=`<div class="cd"><div style="display:flex;justify-content:space-between;margin-bottom:3px">${bd(n.impact==='positive'?'g':n.impact==='negative'?'r':'',n.impact==='positive'?'↑ ALCISTA':n.impact==='negative'?'↓ BAJISTA':'→ NEUTRO')}<span style="font-size:7px;color:#2a3a52">${n.source} · ${n.age||''}</span></div><div style="font-size:10px;font-weight:600;color:#e2e8f0;margin-bottom:2px">${n.title}</div><div style="font-size:9px;color:#64748b;line-height:1.3">${n.summary||''}</div></div>`;});
  }
  document.getElementById('cnt').innerHTML=h;
}
function setTab(t){S.tab=t;render();}
function setTF(t){S.tf=t;document.querySelectorAll('.tf').forEach(b=>{b.classList.toggle('a',b.textContent.toLowerCase().replace(' ','')===(t==='15min'?'15m':t));});loadCandles();}
async function init(){await loadQuote();await loadCandles();refreshPrice();fetchNews();setInterval(refreshPrice,35000);setInterval(()=>{S.fear=Math.max(5,Math.min(95,S.fear+(Math.random()-0.5)*2.5));},20000);}
loadConfig();
</script>
</body>
</html>
