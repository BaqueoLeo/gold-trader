<style>
:root{--bg:#060b14;--card:#0d1420;--bdr:#15202e;--dim:#4a5a72;--txt:#cbd5e1;--br:#f1f5f9;--g:#10b981;--r:#ef4444;--y:#f59e0b;--b:#3b82f6;--p:#8b5cf6}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:12px;max-width:460px;margin:0 auto;min-height:100vh;overflow-x:hidden}
.cfg{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;max-width:460px;margin:0 auto}.cfg h2{color:var(--br);font-size:16px;margin-bottom:12px}.cfg input{width:100%;padding:10px;margin-bottom:8px;background:#111827;border:1px solid var(--bdr);border-radius:6px;color:var(--txt);font-family:inherit;font-size:11px}.cfg button{width:100%;padding:12px;background:#1d4ed8;color:#fff;border:none;border-radius:6px;font-weight:700;font-family:inherit;cursor:pointer;font-size:13px;margin-top:4px}.cfg .rst{background:#7f1d1d;margin-top:8px;font-size:10px;padding:8px}.cfg .nt{font-size:8px;color:var(--dim);margin-top:8px;text-align:center;line-height:1.5}
.hdr{padding:8px 10px 5px;background:linear-gradient(180deg,#0a1020,var(--bg));border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:50}.hdr-r{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}.hdr-l{display:flex;align-items:center;gap:4px}.sym{font-size:9px;color:var(--dim);letter-spacing:2px}
.bd{display:inline-block;padding:2px 6px;border-radius:4px;font-size:8px;font-weight:700;border:1px solid var(--bdr);background:#111827;color:#94a3b8}.bd-g{background:#052e16;color:#4ade80;border-color:#14532d}.bd-r{background:#350a0a;color:#f87171;border-color:#7f1d1d}.bd-y{background:#422006;color:#fbbf24;border-color:#78350f}
.pr{display:flex;align-items:baseline;gap:6px;margin-bottom:1px}.pm{font-size:22px;font-weight:800;color:var(--br);letter-spacing:-1px}.pc{font-size:11px;font-weight:600}.ind{display:flex;gap:6px;font-size:7.5px;color:var(--dim);flex-wrap:wrap}
.tfb{display:flex;gap:2px}.tf{padding:2px 6px;border-radius:3px;border:none;cursor:pointer;font-size:8px;font-weight:700;font-family:inherit;background:#111827;color:var(--dim)}.tf.a{background:#1d4ed8;color:#fff}
.cnt{padding:4px 8px 68px}.cd{background:var(--card);border-radius:8px;border:1px solid var(--bdr);padding:10px;margin-bottom:6px}.lb{font-size:8px;color:var(--dim);letter-spacing:1.5px;font-weight:600}
.tb{display:flex;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;background:#080e19;border-top:1px solid var(--bdr);z-index:100}.tbn{flex:1;padding:4px 0 8px;border:none;background:none;cursor:pointer;font-size:8px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:1px;font-family:inherit;color:#2a3a52}.tbn.a{color:var(--b)}.tbn .ic{font-size:14px}
.pb{background:#111827;border-radius:3px;height:4px;overflow:hidden}.pf{height:100%;border-radius:3px;transition:width 0.5s}
.rbtn{padding:4px 8px;border-radius:3px;border:none;cursor:pointer;background:#1d4ed8;color:#fff;font-size:8px;font-weight:700;font-family:inherit}.rbtn:disabled{opacity:0.5}.rbtn.big{padding:8px 14px;font-size:10px;width:100%}
.sr{display:flex;justify-content:space-between;padding:1px 0;font-size:9px}.g2{display:grid;grid-template-columns:1fr 1fr;gap:5px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:3px}
.sig{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #0f1a28;font-size:9px}.tr{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid #0f1a28;font-size:8px}.cb{background:#0a1020;border-radius:5px;padding:6px;text-align:center}
.upd-status{background:#111827;border:1px solid var(--bdr);border-radius:6px;padding:8px;margin-bottom:6px;font-size:9px;color:var(--dim)}.upd-step{display:flex;align-items:center;gap:6px;padding:2px 0}.upd-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}.upd-done{background:var(--g)}.upd-active{background:var(--y);animation:pulse 1s infinite}.upd-wait{background:#1e293b}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.chat-fab{position:fixed;bottom:62px;right:12px;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#1d4ed8,#7c3aed);border:none;cursor:pointer;z-index:200;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 16px rgba(29,78,216,0.4)}
.chat-panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;height:70vh;background:var(--bg);border-top:2px solid #1d4ed8;z-index:300;display:none;flex-direction:column;border-radius:14px 14px 0 0}.chat-panel.open{display:flex}
.chat-hdr{padding:8px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bdr)}.chat-hdr span{font-size:11px;font-weight:700;color:var(--br)}.chat-close{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:4px}
.chat-msgs{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:6px}.chat-msg{max-width:85%;padding:7px 9px;border-radius:10px;font-size:10px;line-height:1.4;word-wrap:break-word}.chat-msg.user{align-self:flex-end;background:#1d4ed8;color:#fff;border-bottom-right-radius:2px}.chat-msg.ai{align-self:flex-start;background:#111827;color:var(--txt);border-bottom-left-radius:2px;border:1px solid var(--bdr)}
.chat-input{display:flex;gap:5px;padding:6px 10px;border-top:1px solid var(--bdr);background:#0a1020}.chat-input input{flex:1;padding:7px 9px;background:#111827;border:1px solid var(--bdr);border-radius:6px;color:var(--txt);font-family:inherit;font-size:10px}.chat-input button{padding:7px 12px;background:#1d4ed8;color:#fff;border:none;border-radius:6px;font-weight:700;font-family:inherit;cursor:pointer;font-size:11px}

<body>
<div class="cfg" id="cfgS"><h2>🏆 Gold Trader XM v5</h2><input id="c1" placeholder="Twelve Data API Key"><input id="c3" placeholder="Anthropic API Key"><button onclick="saveCfg()">Iniciar</button><button class="rst" onclick="resetAll()">🗑 Reset (si se trabó)</button><div class="nt">v5: Cola inteligente · Plan IA guía al Bot · Historial persistente</div></div>
<div id="app" style="display:none">
<div class="hdr"><div class="hdr-r"><div class="hdr-l"><span class="sym">XAUUSD</span><span class="bd">XM 500:1</span><span id="sDot" style="width:5px;height:5px;border-radius:50%;display:inline-block;background:var(--y)"></span><span id="sTxt" style="font-size:7px;color:var(--y)">...</span></div><div class="tfb"><button class="tf" onclick="setTF('15min')">15m</button><button class="tf a" onclick="setTF('1h')">1H</button><button class="tf" onclick="setTF('4h')">4H</button><button class="tf" onclick="setTF('1day')">1D</button></div></div><div class="pr"><span class="pm" id="pM">...</span><span class="pc" id="pC"></span></div><div class="ind" id="ind"></div></div>

<div class="tb"><button class="tbn a" onclick="setTab('chart')"><span class="ic">📈</span>Gráfica</button><button class="tbn" onclick="setTab('plan')"><span class="ic">🎯</span>Plan</button><button class="tbn" onclick="setTab('bot')"><span class="ic">🤖</span>Bot</button><button class="tbn" onclick="setTab('news')"><span class="ic">📰</span>Info</button></div>
</div>
<script>
let TK='',AK='';
function resetAll(){localStorage.clear();location.reload();}
function saveCfg(){TK=document.getElementById('c1').value.trim();AK=document.getElementById('c3').value.trim();if(!TK){alert('Twelve Data key requerida');return;}localStorage.setItem('gt_t',TK);localStorage.setItem('gt_a',AK);startApp();}
function ldCfg(){TK=localStorage.getItem('gt_t')||'';AK=localStorage.getItem('gt_a')||'';if(TK){document.getElementById('c1').value=TK;document.getElementById('c3').value=AK;startApp();}}
function startApp(){document.getElementById('cfgS').style.display='none';document.getElementById('app').style.display='block';init();}

const TD=e=>`https://api.twelvedata.com/${e}&apikey=${TK}`;
const XM={bal:100,lev:500,so:20,cs:100};
const fmt=n=>`$${Math.abs(n).toFixed(2)}`;const fS=n=>n>=0?`+$${n.toFixed(2)}`:`-$${Math.abs(n).toFixed(2)}`;const fP=n=>n?`$${n.toFixed(2)}`:'—';
const cPnL=(t,e,c,l)=>(t==='BUY'?c-e:e-c)*l*XM.cs;const cMg=(p,l)=>(p*l*XM.cs)/XM.lev;const bd=(c,t)=>`<span class="bd bd-${c}">${t}</span>`;

// Lot scaling based on balance
function getLots(bal){if(bal<200)return 0.03;if(bal<500)return 0.05;if(bal<1000)return 0.08;if(bal<5000)return 0.15;if(bal<20000)return 0.5;if(bal<100000)return 1.0;return 2.0;}

let S={tab:'chart',tf:'1h',gold:null,q:null,candles:[],corr:{btc:null,eur:null,eth:null},status:'connecting',
bot:{bal:100,eq:100,pos:null,trades:[],tT:0,w:0,l:0,resets:0,plan:{action:'ESPERAR',conf:0,signals:{},score:0},ml:0},
news:[],social:[],nI:0,fear:42,aiPlan:null,
upd:{running:false,step:0,steps:['Noticias macro','Noticias geopolíticas','Sentimiento social','Esperando rate limit','Generando Plan IA'],done:[]},
chatHist:[]};

// Load persistent history
function loadHistory(){try{const h=JSON.parse(localStorage.getItem('gt_trades')||'[]');const b=JSON.parse(localStorage.getItem('gt_bot')||'null');if(h.length)S.bot.trades=h;if(b){S.bot.bal=b.bal;S.bot.eq=b.eq;S.bot.tT=b.tT;S.bot.w=b.w;S.bot.l=b.l;S.bot.resets=b.resets;}}catch{}}
function saveHistory(){try{localStorage.setItem('gt_trades',JSON.stringify(S.bot.trades));localStorage.setItem('gt_bot',JSON.stringify({bal:S.bot.bal,eq:S.bot.eq,tT:S.bot.tT,w:S.bot.w,l:S.bot.l,resets:S.bot.resets}));}catch{}}

function sma(d,p){if(d.length<p)return null;return d.slice(-p).reduce((a,b)=>a+b.c,0)/p;}
function calcRSI(d,p=14){if(d.length<p+1)return 50;const ch=[];for(let i=d.length-p;i<d.length;i++)ch.push(d[i].c-d[i-1].c);const g=ch.filter(c=>c>0).reduce((a,b)=>a+b,0)/p;const l=Math.abs(ch.filter(c=>c<0).reduce((a,b)=>a+b,0))/p;return l===0?100:100-100/(1+g/l);}
function calcMACD(d){const e=(dt,p)=>{if(dt.length<p)return null;const k=2/(p+1);let v=dt.slice(0,p).reduce((a,b)=>a+b.c,0)/p;for(let i=p;i<dt.length;i++)v=dt[i].c*k+v*(1-k);return v;};const e12=e(d,12),e26=e(d,26);if(!e12||!e26)return{hist:0};return{hist:(e12-e26)*0.2};}
function calcSR(d){if(d.length<5)return{S:[],R:[]};const c=d.map(x=>x.c),mn=Math.min(...c),mx=Math.max(...c),rn=mx-mn||1;return{S:[mn+rn*0.05,mn+rn*0.236,mn+rn*0.382],R:[mn+rn*0.618,mn+rn*0.786,mn+rn*0.95]};}

async function safeFetch(u,o){try{const r=await fetch(u,o);if(!r.ok)throw new Error(`${r.status}`);return await r.json();}catch(e){console.warn('Fetch:',e.message);return null;}}

// ═══ ANTHROPIC RATE-LIMITED QUEUE ═══
// Direct Claude calls with auto-retry on rate limit
async function callClaude(prompt,maxTok,useSearch){
  if(!AK)return{txt:null,err:'No API key'};
  const body={model:'claude-sonnet-4-20250514',max_tokens:maxTok||600,messages:[{role:'user',content:prompt}]};
  if(useSearch)body.tools=[{type:'web_search_20250305',name:'web_search'}];
  for(let attempt=0;attempt<3;attempt++){
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':AK,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify(body)});
      const d=await r.json();
      if(d.error){
        if(d.error.message?.includes('rate limit')||d.error.message?.includes('credit balance')){
          const wait=Math.min(70,(attempt+1)*25);
          S.upd.retryMsg=`Rate limit - reintentando en ${wait}s...`;render();
          await new Promise(r=>setTimeout(r,wait*1000));continue;}
        return{txt:null,err:d.error.message};}
      const txt=d.content?.filter(b=>b.type==='text').map(b=>b.text).join('')||'';
      return{txt,err:null};
    }catch(e){return{txt:null,err:e.message};}
  }
  return{txt:null,err:'Max retries exceeded'};
}

// TD Queue
let Q=[],tdBusy=false;function enq(u,cb){Q.push({u,cb});}function proc(){if(tdBusy||!Q.length)return;tdBusy=true;const{u,cb}=Q.shift();safeFetch(u).then(d=>cb(d)).finally(()=>{setTimeout(()=>{tdBusy=false},8500);});}setInterval(proc,1000);

// ═══ DATA ═══
async function ldCandles(){const d=await safeFetch(TD(`time_series?symbol=XAU/USD&interval=${S.tf}&outputsize=50`));if(d?.values){S.candles=d.values.reverse().map(v=>({t:new Date(v.datetime).getTime(),o:+v.open,h:+v.high,l:+v.low,c:+v.close}));S.status='live';}render();}
async function ldQuote(){const d=await safeFetch(TD(`quote?symbol=XAU/USD`));if(d?.close){S.gold=+d.close;S.q={open:+d.open,high:+d.high,low:+d.low,close:+d.close,prev:+d.previous_close,ch:+d.change,chp:+d.percent_change,w52l:+d.fifty_two_week?.low,w52h:+d.fifty_two_week?.high};S.status='live';}render();}
async function refP(){
try{const d=await safeFetch(TD(`price?symbol=XAU/USD`));if(d?.price){S.gold=+d.price;S.status='live';if(S.candles.length){const l=S.candles[S.candles.length-1];l.c=S.gold;l.h=Math.max(l.h,S.gold);l.l=Math.min(l.l,S.gold);}runBot();render();}}catch{}
setTimeout(async()=>{try{const d=await safeFetch(TD(`price?symbol=BTC/USD,EUR/USD,ETH/USD`));if(d&&!d.code){S.corr={btc:d['BTC/USD']?.price?+d['BTC/USD'].price:null,eur:d['EUR/USD']?.price?+d['EUR/USD'].price:null,eth:d['ETH/USD']?.price?+d['ETH/USD'].price:null};render();}}catch{}},15000);}

// ═══ MASTER UPDATE (single button) ═══
async function masterUpdate(){
  if(S.upd.running)return;S.upd.retryMsg=null;
  S.upd={running:true,step:0,done:[],steps:['Noticias macro+mercado','Noticias geopolíticas+oil+USD','Sentimiento social Reddit','⏳ Cooldown rate limit','Generando Plan IA completo']};
  render();

  // Step 1: Market news
  S.upd.step=0;render();
  {const{txt}=await callClaude('Search for the latest financial news affecting gold XAUUSD prices. Include: Fed decisions, inflation data, USD strength, bond yields, central bank gold purchases, ETF flows. Return ONLY valid JSON array (no markdown/backticks): [{"title":"string","impact":"positive"|"negative"|"neutral","summary":"1 sentence max","source":"string"}]. Max 8 items.',900,true);
  if(txt){try{const a=JSON.parse(txt.replace(/```json|```/g,'').trim());if(Array.isArray(a))S.news=a;}catch{}}S.upd.done.push(0);render();}

  // Step 2: Geopolitical news
  S.upd.step=1;render();
  {const{txt}=await callClaude('Search for latest geopolitical news, wars, tariffs, oil prices, sanctions that could affect gold XAUUSD. Return ONLY valid JSON array (no markdown): [{"title":"string","impact":"positive"|"negative"|"neutral","summary":"1 sentence","source":"string"}]. Max 6 items.',800,true);
  if(txt){try{const a=JSON.parse(txt.replace(/```json|```/g,'').trim());if(Array.isArray(a))S.news=[...S.news,...a];}catch{}}S.nI=S.news.reduce((a,n)=>a+(n.impact==='positive'?1:n.impact==='negative'?-1:0),0);S.upd.done.push(1);render();}

  // Step 3: Social sentiment
  S.upd.step=2;render();
  {const{txt}=await callClaude('Search Reddit r/Daytrading, r/Forex, r/wallstreetbets and trading forums for recent opinions about gold XAUUSD. What are traders saying? Are they bullish or bearish? What rumors exist? Return ONLY valid JSON array (no markdown): [{"title":"short title","opinion":"quote or summary","sentiment":"bullish"|"bearish"|"neutral","source":"subreddit or forum","rumor":"any rumor mentioned or null"}]. Max 6 items.',800,true);
  if(txt){try{const a=JSON.parse(txt.replace(/```json|```/g,'').trim());if(Array.isArray(a))S.social=a;}catch{}}S.upd.done.push(2);render();}

  // Step 4: Cooldown
  S.upd.step=3;render();
  await new Promise(r=>setTimeout(r,1000));
  S.upd.done.push(3);render();

  // Step 5: AI Plan with ALL context
  S.upd.step=4;render();
  const sr=calcSR(S.candles),_rsi=calcRSI(S.candles),_macd=calcMACD(S.candles);
  const newsAll=S.news.map(n=>`[${n.impact}] ${n.title}: ${n.summary||''}`).join('\n');
  const socialAll=S.social.map(n=>`[${n.sentiment}] ${n.title}: ${n.opinion}${n.rumor?' RUMOR:'+n.rumor:''}`).join('\n');
  const tradeHist=S.bot.trades.slice(0,5).map(t=>`${t.type}@${fP(t.entry)}→${fP(t.exit)} PnL:${fS(t.pnl)} ${t.tag||''}`).join('\n');
  
  const planPrompt=`Eres el analista jefe de un fondo de trading de oro XAUUSD. Tu objetivo es maximizar ganancias con riesgo controlado. Genera un plan de trading detallado usando TODA esta información:

═══ DATOS TÉCNICOS ═══
Precio actual: $${S.gold?.toFixed(2)||'N/A'}
RSI(14): ${_rsi.toFixed(1)} | MACD histograma: ${_macd.hist.toFixed(3)}
SMA20: ${sma(S.candles,20)?.toFixed(2)||'N/A'} | SMA50: ${sma(S.candles,Math.min(50,S.candles.length))?.toFixed(2)||'N/A'}
Soportes: ${sr.S.map(s=>'$'+s.toFixed(2)).join(', ')}
Resistencias: ${sr.R.map(r=>'$'+r.toFixed(2)).join(', ')}
Timeframe actual: ${S.tf}

═══ MERCADOS CORRELACIONADOS ═══
BTC/USD: $${S.corr.btc?.toFixed(0)||'N/A'} | EUR/USD: ${S.corr.eur?.toFixed(4)||'N/A'} | ETH/USD: $${S.corr.eth?.toFixed(0)||'N/A'}

═══ NOTICIAS (${S.news.length} fuentes) ═══
${newsAll||'Sin datos'}

═══ SENTIMIENTO SOCIAL Y RUMORES ═══
${socialAll||'Sin datos'}

═══ CUENTA ═══
Balance: $${S.bot.bal.toFixed(2)} | Lotes: ${getLots(S.bot.bal)} | Apalancamiento: 500:1
Historial reciente:
${tradeHist||'Sin trades previos'}
Total: ${S.bot.tT} trades, ${S.bot.w}W/${S.bot.l}L, ${S.bot.resets} resets

═══ REGLAS ═══
- SIEMPRE proporciona entry, sl y tp con precios EXACTOS numéricos (nunca null)
- Solo operar cuando la probabilidad de éxito sea >70%
- Risk:Reward mínimo 1:2
- Considerar TODAS las noticias y rumores sociales
- Si el mercado está cerrado, preparar plan para apertura del lunes con entry/sl/tp concretos
- Incluso si la acción es ESPERAR, indica el entry ideal, sl y tp para cuando se active la señal

Responde SOLO en JSON válido (sin backticks ni markdown):
{"action":"COMPRA"|"VENTA"|"ESPERAR","confidence":0-100,"reasoning":"explicación detallada en español 3-5 oraciones","entry":"PRECIO NUMÉRICO EXACTO siempre","sl":"PRECIO NUMÉRICO EXACTO siempre","tp":"PRECIO NUMÉRICO EXACTO siempre","risk":"advertencia específica","newsImpact":"resumen de cómo las noticias afectan la decisión","socialSentiment":"resumen del sentimiento social y rumores","marketCondition":"descripción del estado actual del mercado","nextAction":"qué hacer si el precio sube/baja desde aquí"}`;

  {const{txt,err}=await callClaude(planPrompt,800,false);
  if(txt){try{S.aiPlan=JSON.parse(txt.replace(/```json|```/g,'').trim());}catch{S.aiPlan={action:'ERROR',reasoning:txt?.slice(0,300)||'Error parsing'};}}
  else{S.aiPlan={action:'ERROR',reasoning:err||'Error desconocido'};}S.upd.done.push(4);render();}

  S.upd.running=false;
  // Update bot plan based on AI
  if(S.aiPlan&&S.aiPlan.action!=='ERROR'){
    S.bot.plan={action:S.aiPlan.action,conf:S.aiPlan.confidence||50,signals:{ai:S.aiPlan.action,news:S.nI>0?'Alcista':'Bajista'},score:S.aiPlan.confidence||0};
    runBot(true); // Force bot to follow AI plan
  }
  render();
}

// ═══ BOT (follows AI Plan) ═══
let lastBot=0;
function runBot(forceAI=false){
  if(!S.gold||S.candles.length<5)return;
  if(!forceAI&&Date.now()-lastBot<30000)return;
  lastBot=Date.now();
  const p=S.gold,b=S.bot,sr=calcSR(S.candles);
  const _rsi=calcRSI(S.candles);
  
  // If AI plan says act and confidence > 70, follow it
  let act=b.plan.action||'ESPERAR';
  let conf=b.plan.conf||0;

  // Check SL/TP on existing position
  if(b.pos){const pp=b.pos;
    if((pp.type==='BUY'?p<=pp.sl:p>=pp.sl)||(pp.type==='BUY'?p>=pp.tp:p<=pp.tp)){
      const pv=cPnL(pp.type,pp.entry,p,pp.lots);const tg=(pp.type==='BUY'?p>=pp.tp:p<=pp.tp)?'TP':'SL';
      b.bal+=pv;b.trades.unshift({...pp,exit:p,pnl:pv,at:Date.now(),tag:tg,date:new Date().toISOString()});b.trades=b.trades.slice(0,100);
      b.tT++;pv>0?b.w++:b.l++;b.pos=null;saveHistory();}}

  // Close on reverse signal from AI
  if(b.pos&&forceAI&&conf>=50&&((b.pos.type==='BUY'&&act==='VENTA')||(b.pos.type==='SELL'&&act==='COMPRA'))){
    const pv=cPnL(b.pos.type,b.pos.entry,p,b.pos.lots);
    b.bal+=pv;b.trades.unshift({...b.pos,exit:p,pnl:pv,at:Date.now(),date:new Date().toISOString()});b.trades=b.trades.slice(0,100);
    b.tT++;pv>0?b.w++:b.l++;b.pos=null;saveHistory();}

  // Open new position based on AI plan (only if confidence > 70)
  if(!b.pos&&act!=='ESPERAR'&&conf>=70&&b.bal>10){
    const lots=getLots(b.bal);const m=cMg(p,lots);
    if(m<b.bal*0.8){
      const type=act==='COMPRA'?'BUY':'SELL';
      // Use AI-suggested SL/TP if available
      let sl,tp;
      if(S.aiPlan?.sl&&S.aiPlan.sl!=='null'){sl=parseFloat(S.aiPlan.sl);tp=parseFloat(S.aiPlan.tp);}
      else{const slD=5+(100-conf)*0.03;sl=type==='BUY'?p-slD:p+slD;tp=type==='BUY'?p+slD*2:p-slD*2;}
      b.pos={type,entry:p,lots,margin:m,sl,tp,at:Date.now()};
      saveHistory();}}

  // Update equity
  if(b.pos){const ur=cPnL(b.pos.type,b.pos.entry,p,b.pos.lots);b.eq=b.bal+ur;b.ml=b.pos.margin>0?(b.eq/b.pos.margin)*100:0;
    if(b.ml<=XM.so){b.bal=Math.max(0,b.bal+ur);b.trades.unshift({...b.pos,exit:p,pnl:ur,at:Date.now(),tag:'STOP OUT',date:new Date().toISOString()});b.trades=b.trades.slice(0,100);b.tT++;b.l++;b.pos=null;b.ml=0;b.resets++;saveHistory();}}
  else{b.eq=b.bal;b.ml=0;}
  if(b.bal<=1){b.bal=100;b.eq=100;b.pos=null;b.resets++;b.ml=0;saveHistory();}
  render();
}

function rChart(d,sr,w,h){if(d.length<3)return'<div style="text-align:center;padding:25px;color:#2a3a52;font-size:10px">Cargando...</div>';const c=d.map(x=>x.c),all=[...c,...(sr?.S||[]),...(sr?.R||[])],mn=Math.min(...all)-1,mx=Math.max(...all)+1,rn=mx-mn||1;const y=v=>10+((mx-v)/rn)*(h-20),x=i=>6+(i/(c.length-1))*(w-12);const line=c.map((v,i)=>`${i===0?'M':'L'}${x(i)},${y(v)}`).join(' ');const area=`${line} L${x(c.length-1)},${h-10} L${x(0)},${h-10} Z`;const up=c[c.length-1]>=c[0],col=up?'var(--g)':'var(--r)';let s=`<svg width="${w}" height="${h}" style="display:block"><defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity="0.15"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs><path d="${area}" fill="url(#cg)"/><path d="${line}" fill="none" stroke="${col}" stroke-width="1.5"/>`;(sr?.S||[]).forEach((v,i)=>{s+=`<line x1="6" y1="${y(v)}" x2="${w-6}" y2="${y(v)}" stroke="var(--g)" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.4"/><text x="${w-4}" y="${y(v)-2}" fill="var(--g)" font-size="6" text-anchor="end">S${i+1}</text>`;});(sr?.R||[]).forEach((v,i)=>{s+=`<line x1="6" y1="${y(v)}" x2="${w-6}" y2="${y(v)}" stroke="var(--r)" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.4"/><text x="${w-4}" y="${y(v)-2}" fill="var(--r)" font-size="6" text-anchor="end">R${i+1}</text>`;});s+=`<circle cx="${x(c.length-1)}" cy="${y(c[c.length-1])}" r="3" fill="${col}"><animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/></circle><text x="${x(c.length-1)-3}" y="${y(c[c.length-1])-5}" fill="${col}" font-size="7" font-weight="700" text-anchor="end">${fP(c[c.length-1])}</text></svg>`;return s;}
function gauge(v,lb,mn=0,mx=100){const p=Math.max(0,Math.min(1,(v-mn)/(mx-mn)));const c=p<0.3?'var(--r)':p<0.6?'var(--y)':'var(--g)';return`<div style="text-align:center"><svg width="56" height="32" viewBox="0 0 56 32"><path d="M 4 28 A 20 20 0 0 1 52 28" fill="none" stroke="#1a2332" stroke-width="4" stroke-linecap="round"/><path d="M 4 28 A 20 20 0 0 1 52 28" fill="none" stroke="${c}" stroke-width="4" stroke-linecap="round" stroke-dasharray="${p*63} 63"/></svg><div style="font-size:6px;color:var(--dim);margin-top:-2px">${lb}</div><div style="font-size:10px;font-weight:700;color:${c}">${v?.toFixed(0)}</div></div>`;}
